<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard iPad</title>
    <style>
        /* Fondo base y capa oscura */
        body {
            background-color: #000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out;
            gap: 40px; 
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Tarjeta Izquierda: Reloj y Tiempo */
        .dashboard-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 60px;
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Tarjeta Derecha: Podcasts */
        .podcast-card {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 380px;
            height: 420px; /* Altura fija */
            box-sizing: border-box;
        }

        /* Botones para cambiar de podcast */
        .podcast-tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            flex-grow: 1;
            transition: background 0.3s;
            text-align: center;
        }

        .tab-btn:hover, .tab-btn.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        /* Estilos del reproductor nativo */
        #native-player-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
        }

        #podcast-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #podcast-img {
            width: 160px;
            height: 160px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #episode-title {
            font-size: 0.95rem;
            color: #fff;
            margin: 0 0 15px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            line-height: 1.4;
        }

        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }

        #loading-msg {
            color: #a1a1aa;
            font-size: 0.9rem;
        }

        /* Estilos del reloj */
        #greeting { font-size: 1.5rem; color: #e4e4e7; font-weight: 500; margin-bottom: -10px;}
        #clock { font-size: 7rem; font-weight: 700; letter-spacing: -2px; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #date { font-size: 1.5rem; color: #d4d4d8; font-weight: 400; text-transform: capitalize; margin-bottom: 20px; }
        
        .weather-container { width: 300px; }
        .nasa-title { position: absolute; bottom: 20px; left: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.6); max-width: 50%; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="nasa-title" class="nasa-title">Cargando imagen...</div>

    <div class="dashboard-card">
        <div id="greeting">Hola</div>
        <div id="clock">00:00</div>
        <div id="date">Cargando fecha...</div>
        <div class="weather-container">
            <a class="weatherwidget-io" href="https://forecast7.com/es/36d47n6d20/san-fernando/" data-label_1="SAN FERNANDO" data-label_2="EL TIEMPO" data-font="Helvetica" data-icons="Climacons Animated" data-theme="dark" data-basecolor="rgba(0,0,0,0)" >SAN FERNANDO EL TIEMPO</a>
            <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
        </div>
    </div>

    <div class="podcast-card">
        <div class="podcast-tabs">
            <button class="tab-btn active" onclick="loadPodcast('1570234432', this)">Recarga Activa</button>
            <button class="tab-btn" onclick="loadPodcast('1642338651', this)">Chiclana & Friends</button>
            <button class="tab-btn" onclick="loadPodcast('359611484', this)">Reload</button>
        </div>

        <div id="native-player-container">
            <p id="loading-msg">Buscando último episodio...</p>
            
            <div id="podcast-content">
                <img id="podcast-img" src="" alt="Portada del Podcast">
                <h4 id="episode-title">Título del episodio</h4>
                <audio id="audio-player" controls preload="metadata"></audio>
            </div>
        </div>
    </div>

    <script>
        // === 1. RELOJ Y FECHA ===
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            let dateString = now.toLocaleDateString('es-ES', options);
            document.getElementById('date').textContent = dateString;

            const currentHour = now.getHours();
            let greeting = 'Buenas noches';
            if (currentHour >= 6 && currentHour < 13) { greeting = 'Buenos días'; } 
            else if (currentHour >= 13 && currentHour < 20) { greeting = 'Buenas tardes'; }
            document.getElementById('greeting').textContent = greeting;
        }
        setInterval(updateTime, 1000); updateTime();

        // === 2. IMAGEN DE LA NASA ===
        async function fetchNasaImage() {
            try {
                const response = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
                const data = await response.json();
                if(data.media_type === 'image') {
                    document.body.style.backgroundImage = `url('${data.hdurl || data.url}')`;
                    document.getElementById('nasa-title').textContent = "NASA APOD: " + data.title;
                } else {
                    document.body.style.backgroundImage = `url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000&auto=format&fit=crop')`;
                    document.getElementById('nasa-title').textContent = "Imagen espacial";
                }
            } catch (error) { console.log("Error API NASA", error); }
        }
        fetchNasaImage(); setInterval(fetchNasaImage, 12 * 60 * 60 * 1000);

        // === 3. REPRODUCTOR DE PODCASTS NATIVO ===
        async function loadPodcast(appleId, buttonElement) {
            // Estilo visual del botón activo
            if(buttonElement) {
                const buttons = document.querySelectorAll('.tab-btn');
                buttons.forEach(btn => btn.classList.remove('active'));
                buttonElement.classList.add('active');
            }

            // Preparar UI para carga
            document.getElementById('loading-msg').style.display = 'block';
            document.getElementById('loading-msg').textContent = 'Buscando último episodio...';
            document.getElementById('podcast-content').style.display = 'none';
            document.getElementById('audio-player').pause();

            try {
                // Paso A: Pedirle a la API de Apple la información del Podcast según su ID
                const appleRes = await fetch(`https://itunes.apple.com/lookup?id=${appleId}`);
                const appleData = await appleRes.json();
                const feedUrl = appleData.results[0].feedUrl;
                const artwork = appleData.results[0].artworkUrl600;

                // Paso B: Convertir el feed RSS del podcast en datos que el iPad pueda leer (JSON)
                const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
                const rssData = await rssRes.json();
                
                // Coger el episodio más reciente
                const latestEpisode = rssData.items[0];
                
                // Paso C: Mostrar la portada, título y cargar el audio en el reproductor nativo
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('podcast-content').style.display = 'flex';
                
                document.getElementById('podcast-img').src = artwork;
                document.getElementById('episode-title').textContent = latestEpisode.title;
                
                const audio = document.getElementById('audio-player');
                audio.src = latestEpisode.enclosure.link; // El MP3 directo
                
            } catch(error) {
                document.getElementById('loading-msg').textContent = 'Error al cargar. Intenta de nuevo.';
                console.error("Error cargando podcast:", error);
            }
        }

        // Cargar "Recarga Activa" por defecto al abrir la pantalla
        loadPodcast('1570234432', null);
    </script>
</body>
</html>
