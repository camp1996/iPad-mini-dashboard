<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Apple_gray_logo.png/1024px-Apple_gray_logo.png">

    <title>Dashboard iPad</title>
    <style>
        html { background-color: #000000; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1;
        }

        .nasa-title { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.4); 
            max-width: 50%; 
        }

        .center-clock {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -160px; 
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #clock { 
            font-size: 14rem; 
            font-weight: 700; 
            letter-spacing: -5px; 
            margin: 0; 
            line-height: 1;
        }
        
        #date { 
            font-size: 2.2rem; 
            color: #d4d4d8; 
            font-weight: 300; 
            margin-top: 5px;
        }

        /* Estilo para la cuenta atrás */
        #countdown {
            font-size: 1.2rem;
            color: #ff9f0a; /* Color naranja suave estilo iOS para que destaque */
            font-weight: 500;
            margin-top: 15px;
            background: rgba(255, 159, 10, 0.15);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 159, 10, 0.3);
            text-transform: lowercase;
        }

        .bottom-widgets {
            position: absolute;
            bottom: 30px;
            width: 92%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px; 
            box-sizing: border-box;
        }

        .weather-card { width: 360px; }
        .podcast-card { width: 360px; display: flex; flex-direction: column; }

        .podcast-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 6px; 
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem; 
            flex-grow: 1;
            transition: background 0.3s;
            text-align: center;
        }
        .tab-btn.active { background: rgba(255, 255, 255, 0.3); font-weight: bold; }

        #podcast-content { display: none; flex-direction: column; width: 100%; }
        .podcast-info { display: flex; flex-direction: row; align-items: center; gap: 18px; margin-bottom: 15px; }
        #podcast-img { width: 85px; height: 85px; border-radius: 15px; object-fit: cover; }
        #episode-title { font-size: 0.95rem; color: #e4e4e7; margin: 0; line-height: 1.4; text-align: left; }
        audio { width: 100%; height: 42px; }
        #loading-msg { color: #a1a1aa; font-size: 0.9rem; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="nasa-title" class="nasa-title">cargando imagen...</div>

    <div class="center-clock">
        <div id="clock">00:00</div>
        <div id="date">cargando fecha...</div>
        <div id="countdown">calculando...</div>
    </div>

    <div class="bottom-widgets">
        <div class="glass-card weather-card">
            <a class="weatherwidget-io" href="https://forecast7.com/es/36d47n6d20/san-fernando/" data-label_1="SAN FERNANDO" data-mode="Current" data-font="Helvetica" data-icons="Climacons Animated" data-theme="dark" data-basecolor="rgba(0,0,0,0)" >EL TIEMPO</a>
            <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
        </div>

        <div class="glass-card podcast-card">
            <div class="podcast-tabs">
                <button class="tab-btn active" onclick="loadPodcast('1570234432', this)">Recarga Activa</button>
                <button class="tab-btn" onclick="loadPodcast('1642338651', this)">Chiclana & Friends</button>
                <button class="tab-btn" onclick="loadPodcast('359611484', this)">Reload</button>
            </div>
            <div id="native-player-container">
                <p id="loading-msg">Buscando episodio...</p>
                <div id="podcast-content">
                    <div class="podcast-info">
                        <img id="podcast-img" src="" alt="Portada">
                        <h4 id="episode-title">Título del episodio</h4>
                    </div>
                    <audio id="audio-player" controls preload="metadata"></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }).toLowerCase();

            // Lógica de cuenta atrás al 23 de mayo
            const targetDate = new Date(now.getFullYear(), 4, 23); // 4 es mayo (0-11)
            if (now > targetDate) targetDate.setFullYear(now.getFullYear() + 1);
            const diff = targetDate - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').textContent = `faltan ${days} días para el 23 de mayo`;
        }
        setInterval(updateTime, 1000); updateTime();

        async function fetchNasaImage() {
            try {
                const response = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
                const data = await response.json();
                if(data.media_type === 'image') {
                    document.body.style.backgroundImage = `url('${data.hdurl || data.url}')`;
                    document.getElementById('nasa-title').textContent = "nasa apod: " + data.title.toLowerCase();
                }
            } catch (e) {}
        }
        fetchNasaImage();

        async function loadPodcast(appleId, buttonElement) {
            if(buttonElement) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                buttonElement.classList.add('active');
            }
            document.getElementById('loading-msg').style.display = 'block';
            document.getElementById('podcast-content').style.display = 'none';
            try {
                const appleRes = await fetch(`https://itunes.apple.com/lookup?id=${appleId}`);
                const appleData = await appleRes.json();
                const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(appleData.results[0].feedUrl)}`);
                const rssData = await rssRes.json();
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('podcast-content').style.display = 'flex';
                document.getElementById('podcast-img').src = appleData.results[0].artworkUrl600;
                document.getElementById('episode-title').textContent = rssData.items[0].title;
                document.getElementById('audio-player').src = rssData.items[0].enclosure.link;
            } catch(e) {}
        }
        loadPodcast('1570234432', null);
    </script>
</body>
</html>
