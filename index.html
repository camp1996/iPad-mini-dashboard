<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dashboard Mini (Reloj Grande)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        #fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 2s ease-in-out; 
        }

        #filtro-oscuro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2;
        }

        #contenido {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #ffffff;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
        }

        #saludo {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: -15px;
            color: #d1d1d1;
        }

        #reloj {
            font-size: 14em;
            font-weight: 200;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -3px;
        }

        #fecha {
            font-size: 2.2em;
            font-weight: 300;
            margin-top: 5px;
            color: #f0f0f0;
        }

        /* --- NUEVO ESTILO PARA LA CUENTA ATRÁS --- */
        #cuenta-atras {
            font-size: 1.5em;
            font-weight: 300;
            margin-top: 15px;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        #clima {
            font-size: 2em;
            font-weight: 300;
            margin-top: 20px;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div id="fondo"></div>
    <div id="filtro-oscuro"></div>
    
    <div id="contenido">
        <div id="saludo">Hola</div>
        <div id="reloj">--:--</div>
        <div id="fecha">Cargando...</div>
        <div id="cuenta-atras">Calculando días...</div>
        <div id="clima">Cargando clima...</div>
    </div>

    <script>
        function actualizarReloj() {
            var ahora = new Date();
            var horas = ahora.getHours();
            var minutos = ahora.getMinutes();
            
            var textoSaludo = "Buenas noches";
            if (horas >= 6 && horas < 13) { textoSaludo = "Buenos días"; }
            else if (horas >= 13 && horas < 20) { textoSaludo = "Buenas tardes"; }
            document.getElementById('saludo').innerHTML = textoSaludo;

            if (horas < 10) { horas = "0" + horas; }
            if (minutos < 10) { minutos = "0" + minutos; }
            document.getElementById('reloj').innerHTML = horas + ":" + minutos;

            var opciones = { weekday: 'long', month: 'long', day: 'numeric' };
            var fechaFormateada = ahora.toLocaleDateString('es-ES', opciones);
            fechaFormateada = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
            document.getElementById('fecha').innerHTML = fechaFormateada;
        }
