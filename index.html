<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Dashboard Fútbol Hoy</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        #fondo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; transition: background-image 2s; opacity: 0.6; }
        #capa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 2; }
        
        #contenedor { position: relative; z-index: 3; display: flex; width: 100%; height: 100%; color: white; }

        /* Izquierda: Reloj */
        #bloque-reloj { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-shadow: 0px 4px 15px rgba(0,0,0,0.8); }
        #saludo { font-size: 2.5em; font-weight: 300; margin-bottom: -10px; color: #ddd; }
        #reloj { font-size: 12em; font-weight: 200; margin: 0; letter-spacing: -3px; }
        #fecha { font-size: 2.2em; font-weight: 300; margin-top: 10px; }
        #clima { font-size: 2em; font-weight: 300; margin-top: 20px; color: #4CAF50; }

        /* Derecha: Fútbol */
        #bloque-futbol { width: 350px; display: flex; flex-direction: column; justify-content: center; padding-right: 30px; }
        #panel { background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15); border-radius: 25px; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .titulo { font-size: 1.5em; font-weight: 400; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-bottom: 15px; color: #fff; }
        .partido { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .partido:last-child { border-bottom: none; }
        .liga { font-size: 0.7em; color: #aaa; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 1px; }
        .equipos { font-size: 1.05em; font-weight: 400; line-height: 1.2; }
        .hora { color: #4CAF50; font-size: 0.9em; font-weight: bold; margin-top: 5px; }
        .info { text-align: center; font-style: italic; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="fondo"></div>
    <div id="capa"></div>

    <div id="contenedor">
        <div id="bloque-reloj">
            <div id="saludo">Hola</div>
            <div id="reloj">00:00</div>
            <div id="fecha">...</div>
            <div id="clima">🌡️ --°C</div>
        </div>

        <div id="bloque-futbol">
            <div id="panel">
                <div class="titulo">⚽ Partidos Hoy</div>
                <div id="lista-partidos">
                    <div class="info">Conectando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN OFICIAL
        var TOKEN = "938059db35794b3e9899b075719dd2d1";
        
        function pad(n) { return n < 10 ? '0' + n : n; }

        // RELOJ Y FECHA (Compatible 100% con iPad antiguo)
        function actualizarReloj() {
            var ahora = new Date();
            var h = ahora.getHours(), m = ahora.getMinutes();
            var saludo = (h >= 6 && h < 13) ? "Buenos días" : (h >= 13 && h < 20) ? "Buenas tardes" : "Buenas noches";
            
            document.getElementById('saludo').innerHTML = saludo;
            document.getElementById('reloj').innerHTML = pad(h) + ":" + pad(m);
            
            var dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            var meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
            document.getElementById('fecha').innerHTML = dias[ahora.getDay()] + ", " + ahora.getDate() + " de " + meses[ahora.getMonth()];
        }

        // FONDO ALEATORIO
        function actualizarFondo() {
            var h = new Date().getHours();
            if (h >= 0 && h < 8) {
                document.getElementById('fondo').style.backgroundImage = "none";
            } else {
                var img = "https://picsum.photos/1024/768/?random&t=" + new Date().getTime();
                document.getElementById('fondo').style.backgroundImage = "url('" + img + "')";
            }
        }

        // CLIMA (San Fernando)
        function actualizarClima() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://api.open-meteo.com/v1/forecast?latitude=36.4665&longitude=-6.1989&current_weather=true", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var d = JSON.parse(xhr.responseText);
                    document.getElementById('clima').innerHTML = "🌡️ " + Math.round(d.current_weather.temperature) + "°C";
                }
            };
            xhr.send();
        }

        // FÚTBOL (Football-Data V4 vía Proxy para evitar Bloqueo CORS / Error 0)
        function actualizarFutbol() {
            var contenedor = document.getElementById('lista-partidos');
            var urlOriginal = "https://api.football-data.org/v4/matches";
            
            // Usamos un proxy que permite inyectar el Token sin que el navegador se queje
            var urlProxy = "https://corsproxy.io/?url=" + encodeURIComponent(urlOriginal);

            var xhr = new XMLHttpRequest();
            xhr.open("GET", urlProxy, true);
            
            // Inyectamos tu Token
            xhr.setRequestHeader("X-Auth-Token", TOKEN);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        var res = JSON.parse(xhr.responseText);
                        var partidos = res.matches || [];
                        var html = "";
                        
                        if (partidos.length === 0) {
                            html = '<div class="info">No hay partidos hoy en tu plan de suscripción.</div>';
                        } else {
                            // Ordenar por hora
                            partidos.sort(function(a, b) { return new Date(a.utcDate) - new Date(b.utcDate); });
                            
                            partidos.forEach(function(p) {
                                var fechaP = new Date(p.utcDate);
                                var hP = pad(fechaP.getHours()) + ":" + pad(fechaP.getMinutes());
                                html += '<div class="partido">' +
                                        '<div class="liga">' + p.competition.name + '</div>' +
                                        '<div class="equipos">' + p.homeTeam.shortName + ' - ' + p.awayTeam.shortName + '</div>' +
                                        '<div class="hora">' + hP + '</div>' +
                                        '</div>';
                            });
                        }
                        contenedor.innerHTML = html;
                    } else {
                        // Si da error 0 aquí, es el bloqueador de Vivaldi
                        contenedor.innerHTML = '<div class="info">Error de conexión (' + xhr.status + ').<br>Revisa el escudo de Vivaldi.</div>';
                    }
                }
            };
            xhr.send();
        }

        // CICLOS DE ACTUALIZACIÓN
        setInterval(actualizarReloj, 1000); actualizarReloj();
        setInterval(actualizarFondo, 600000); actualizarFondo();
        setInterval(actualizarClima, 1800000); actualizarClima();
        setInterval(actualizarFutbol, 3600000); setTimeout(actualizarFutbol, 1000);
    </script>
</body>
</html>
