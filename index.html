<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Dashboard iPad</title>

    <style>
        /* RESET Y FONDO */
        html, body { background-color: #000; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        body {
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CAPA OSCURA DE CONTRASTE */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        /* ESTRUCTURA PRINCIPAL (ASIMÉTRICA) */
        .main-layout {
            position: relative;
            z-index: 10;
            width: 92%;
            height: 90%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        /* COLUMNA IZQUIERDA (HORA Y FECHA) */
        .left-column {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* HORA GIGANTE TRANSPARENTE */
        #clock { 
            font-size: 15rem; 
            font-weight: 700; 
            letter-spacing: -6px; 
            margin: 0; 
            line-height: 1;
            /* Efecto cristal en el texto */
            color: rgba(255, 255, 255, 0.20); 
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.6); 
            text-shadow: 0 15px 30px rgba(0,0,0,0.4); 
        }
        
        #date { 
            font-size: 2.2rem; 
            color: #e4e4e7; 
            font-weight: 400; 
            margin-top: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        #countdown {
            font-size: 1.2rem; 
            color: #ff9f0a; 
            font-weight: 500; 
            margin-top: 20px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* COLUMNA DERECHA (TARJETAS) */
        .right-column {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px; 
            flex-shrink: 0;
        }

        /* ESTILO COMÚN DE LAS TARJETAS DE CRISTAL */
        .glass-card { 
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 20px; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* TARJETA 2: NOTICIAS */
        .card-title {
            font-size: 0.8rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #news-content { display: flex; flex-direction: column; gap: 12px; }

        .news-item {
            font-size: 0.95rem;
            color: #f4f4f5;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .news-item:last-child { border-bottom: none; padding-bottom: 0; }

        /* TARJETA 3: PODCASTS */
        .podcast-tabs { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 8px; }
        .tab-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 8px 4px; border-radius: 8px; font-size: 0.75rem; flex-grow: 1; text-align: center; cursor: pointer; transition: all 0.2s;}
        .tab-btn.active { background: rgba(255, 159, 10, 0.8); color: #000; font-weight: bold; border: none; } 

        #podcast-content { display: none; flex-direction: column; width: 100%; }
        .podcast-info { display: flex; flex-direction: row; align-items: center; gap: 15px; margin-bottom: 12px; }
        #podcast-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        #episode-title { font-size: 0.9rem; color: #e4e4e7; margin: 0; line-height: 1.3; text-align: left; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;}
        audio { width: 100%; height: 35px; outline: none;}
    </style>
</head>
