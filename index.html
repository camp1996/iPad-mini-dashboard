<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Dashboard iPad</title>
    <style>
        html, body { background-color: #000; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        body {
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); 
            z-index: 1;
        }

        .content-layer { position: relative; z-index: 10; width: 92%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .nasa-title { position: absolute; top: 20px; left: 0; font-size: 0.8rem; color: rgba(255,255,255,0.4); }

        /* RELOJ */
        .center-clock { display: flex; flex-direction: column; align-items: center; margin-top: -120px; text-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        #clock { font-size: 14rem; font-weight: 700; letter-spacing: -5px; margin: 0; line-height: 1; }
        #date { font-size: 2.2rem; color: #d4d4d8; font-weight: 300; margin-top: 5px; }
        #countdown {
            font-size: 1.1rem; color: #ff9f0a; font-weight: 500; margin-top: 15px;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            padding: 6px 18px; border-radius: 20px; border: 1px solid rgba(255, 159, 10, 0.4); text-transform: lowercase;
        }

        /* WIDGETS */
        .bottom-widgets { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; }
        .glass-card { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; box-sizing: border-box; width: 360px; }

        .podcast-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .tab-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; padding: 10px 6px; border-radius: 10px; font-size: 0.8rem; flex-grow: 1; text-align: center; cursor: pointer; }
        .tab-btn.active { background: rgba(255, 255, 255, 0.3); font-weight: bold; }

        #podcast-content { display: none; flex-direction: column; width: 100%; }
        .podcast-info { display: flex; flex-direction: row; align-items: center; gap: 18px; margin-bottom: 15px; }
        #podcast-img { width: 85px; height: 85px; border-radius: 15px; object-fit: cover; }
        #episode-title { font-size: 0.95rem; color: #e4e4e7; margin: 0; line-height: 1.4; text-align: left; }
        audio { width: 100%; height: 40px; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content-layer">
        <div id="nasa-title" class="nasa-title">paisaje diario</div>

        <div class="center-clock">
            <div id="clock">--:--</div>
            <div id="date">cargando...</div>
            <div id="countdown">...</div>
        </div>

        <div class="bottom-widgets">
            <div class="glass-card">
                <a class="weatherwidget-io" href="https://forecast7.com/es/36d47n6d20/san-fernando/" data-label_1="SAN FERNANDO" data-mode="Current" data-font="Helvetica" data-icons="Climacons Animated" data-theme="dark" data-basecolor="rgba(0,0,0,0)" >TIEMPO</a>
                <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
            </div>

            <div class="glass-card">
                <div class="podcast-tabs">
                    <button class="tab-btn active" onclick="loadPodcast('1570234432', this)">Recarga Activa</button>
                    <button class="tab-btn" onclick="loadPodcast('1642338651', this)">Chiclana</button>
                    <button class="tab-btn" onclick="loadPodcast('359611484', this)">Reload</button>
                </div>
                <div id="podcast-loader" style="color:#aaa; font-size:0.9rem; text-align:center;">buscando...</div>
                <div id="podcast-content">
                    <div class="podcast-info">
                        <img id="podcast-img" src="" alt="">
                        <h4 id="episode-title"></h4>
                    </div>
                    <audio id="audio-player" controls></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. RELOJ, FECHA Y CUENTA ATRÁS
        function updateAll() {
            var now = new Date();
            var h = now.getHours().toString().padStart(2, '0');
            var m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerHTML = h + ":" + m;

            var dOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerHTML = now.toLocaleDateString('es-ES', dOptions).toLowerCase();

            var target = new Date(now.getFullYear(), 4, 23);
            if (now > target) target.setFullYear(now.getFullYear() + 1);
            var diff = target - now;
            var days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerHTML = "faltan " + days + " días para el 23 de mayo";
        }
        setInterval(updateAll, 1000);
        updateAll();

        // 2. IMAGEN DE FONDO (Unsplash Nativo)
        function setBg() {
            var d = new Date();
            var seed = d.getDate() + d.getMonth() + d.getFullYear();
            var url = "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=2000&q=80&sig=" + seed;
            document.body.style.backgroundImage = "url('" + url + "')";
        }
        setBg();

        // 3. PODCASTS
        async function loadPodcast(id, btn) {
            if(btn) {
                var btns = document.getElementsByClassName('tab-btn');
                for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
                btn.classList.add('active');
            }
            
            document.getElementById('podcast-loader').style.display = 'block';
            document.getElementById('podcast-content').style.display = 'none';
            
            try {
                var r1 = await fetch("https://itunes.apple.com/lookup?id=" + id);
                var d1 = await r1.json();
                var feed = d1.results[0].feedUrl;
                var img = d1.results[0].artworkUrl600;

                var r2 = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed));
                var d2 = await r2.json();
                
                document.getElementById('podcast-loader').style.display = 'none';
                document.getElementById('podcast-content').style.display = 'flex';
                document.getElementById('podcast-img').src = img;
                document.getElementById('episode-title').innerHTML = d2.items[0].title;
                document.getElementById('audio-player').src = d2.items[0].enclosure.link;
            } catch(e) {
                document.getElementById('podcast-loader').innerHTML = "error de conexión";
            }
        }
        loadPodcast('1570234432', null);
    </script>
</body>
</html>
