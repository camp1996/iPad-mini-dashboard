<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dashboard Mini Total</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        #fondo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: 1; transition: background-image 2s ease-in-out; 
        }
        #filtro-oscuro {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: 2;
        }
        #contenido {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #ffffff; text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
        }
        #saludo { font-size: 2.5em; font-weight: 300; margin-bottom: -15px; color: #d1d1d1; }
        #reloj { font-size: 14em; font-weight: 200; margin: 0; line-height: 1.1; letter-spacing: -3px; }
        #fecha { font-size: 2.2em; font-weight: 300; margin-top: 5px; color: #f0f0f0; }
        #clima { font-size: 2em; font-weight: 300; margin-top: 20px; color: #e0e0e0; display: flex; align-items: center; gap: 10px; }
        
        /* Panel de Partidos */
        #panel-partidos {
            position: absolute; right: 40px; top: 50%;
            transform: translateY(-50%); background: rgba(0, 0, 0, 0.55);
            padding: 25px; border-radius: 20px; width: 260px;
            z-index: 4; color: white; border: 1px solid rgba(255, 255, 255, 0.15);
            max-height: 80%; overflow: hidden; /* Por si hay muchos partidos */
        }
        .titulo-panel {
            font-size: 1.5em; font-weight: 300; margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3); padding-bottom: 10px;
            text-align: center; letter-spacing: 1px;
        }
        .partido {
            margin-bottom: 15px; display: flex; flex-direction: column;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px;
        }
        .partido:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .competicion { font-size: 0.75em; color: #b3b3b3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .equipos { font-size: 1.05em; font-weight: 400; line-height: 1.3; }
        .hora-partido { color: #4CAF50; font-size: 0.9em; margin-top: 4px; font-weight: bold; }
        #mensaje-sin-partidos { text-align: center; color: #b3b3b3; font-size: 0.9em; font-style: italic; }
    </style>
</head>
<body>

    <div id="fondo"></div>
    <div id="filtro-oscuro"></div>
    
    <div id="contenido">
        <div id="saludo">Hola</div>
        <div id="reloj">--:--</div>
        <div id="fecha">Cargando...</div>
        <div id="clima">Cargando clima...</div>
    </div>

    <div id="panel-partidos">
        <div class="titulo-panel">⚽ Hoy</div>
        <div id="lista-partidos">
            <div id="mensaje-sin-partidos">Cargando partidos...</div>
        </div>
    </div>

    <script>
        // === PEGA TU API KEY AQUÍ ===
        var miApiKeyFútbol = "PON_TU_CLAVE_AQUI"; 
        // ============================

        // Función auxiliar para añadir ceros (compatible con iOS antiguo)
        function ponerCero(numero) { return numero < 10 ? "0" + numero : numero; }

        // --- RELOJ ---
        function actualizarReloj() {
            var ahora = new Date();
            var horas = ahora.getHours();
            var minutos = ahora.getMinutes();
            
            var textoSaludo = "Buenas noches";
            if (horas >= 6 && horas < 13) { textoSaludo = "Buenos días"; }
            else if (horas >= 13 && horas < 20) { textoSaludo = "Buenas tardes"; }
            document.getElementById('saludo').innerHTML = textoSaludo;

            document.getElementById('reloj').innerHTML = ponerCero(horas) + ":" + ponerCero(minutos);

            var opciones = { weekday: 'long', month: 'long', day: 'numeric' };
            var fechaFormateada = ahora.toLocaleDateString('es-ES', opciones);
            fechaFormateada = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
            document.getElementById('fecha').innerHTML = fechaFormateada;
        }

        // --- FONDO ---
        function actualizarFondo() {
            var horas = new Date().getHours();
            if (horas >= 0 && horas < 8) {
                document.getElementById('fondo').style.backgroundImage = "none";
            } else {
                var urlFoto = "https://picsum.photos/2048/1536/?random&t=" + new Date().getTime();
                document.getElementById('fondo').style.backgroundImage = "url('" + urlFoto + "')";
            }
        }

        // --- CLIMA ---
        function interpretarClima(codigo) {
            if (codigo === 0) return "☀️"; 
            if (codigo >= 1 && codigo <= 3) return "⛅";
            if (codigo === 45 || codigo === 48) return "🌫️";
            if (codigo >= 51 && codigo <= 67) return "🌧️";
            if (codigo >= 71 && codigo <= 77) return "❄️";
            if (codigo >= 80 && codigo <= 82) return "🌦️";
            if (codigo >= 95) return "⛈️";
            return "🌡️";
        }
        function actualizarClima() {
            var url = "https://api.open-meteo.com/v1/forecast?latitude=36.4665&longitude=-6.1989&current_weather=true";
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var datos = JSON.parse(xhr.responseText);
                    var temperatura = Math.round(datos.current_weather.temperature);
                    var icono = interpretarClima(datos.current_weather.weathercode);
                    document.getElementById('clima').innerHTML = icono + " " + temperatura + "°C";
                }
            };
            xhr.send();
        }

        // --- PARTIDOS DE FÚTBOL ---
        function actualizarPartidos() {
            if (miApiKeyFútbol === "133841d8e5ebb3d6405f3a7bb1faeb96") return; // Evita errores si no has puesto la clave

            var ahora = new Date();
            var yyyy = ahora.getFullYear();
            var mm = ponerCero(ahora.getMonth() + 1);
            var dd = ponerCero(ahora.getDate());
            var fechaHoyStr = yyyy + "-" + mm + "-" + dd;
            
            // Calculamos la temporada (si estamos antes de agosto, sigue siendo la temporada que empezó el año pasado)
            var temporada = ahora.getMonth() < 7 ? yyyy - 1 : yyyy;
            
            // Ligas: 140 (LaLiga), 2 (Champions), 3 (Europa L.), 848 (Conference)
            var ligas = [140, 2, 3, 848];
            var contenedor = document.getElementById('lista-partidos');
            var partidosTotales = [];
            var peticionesCompletadas = 0;

            contenedor.innerHTML = '<div id="mensaje-sin-partidos">Buscando partidos...</div>';

            ligas.forEach(function(idLiga) {
                var url = "https://v3.football.api-sports.io/fixtures?date=" + fechaHoyStr + "&league=" + idLiga + "&season=" + temporada + "&timezone=Europe/Madrid";
                
                var xhr = new XMLHttpRequest();
                xhr.open("GET", url, true);
                xhr.setRequestHeader("x-apisports-key", miApiKeyFútbol);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4) {
                        peticionesCompletadas++;
                        if (xhr.status == 200) {
                            var respuesta = JSON.parse(xhr.responseText);
                            partidosTotales = partidosTotales.concat(respuesta.response);
                        }
                        
                        // Cuando terminen de cargar las 4 ligas, dibujamos el panel
                        if (peticionesCompletadas === ligas.length) {
                            contenedor.innerHTML = ""; // Limpiamos mensaje de carga
                            
                            if (partidosTotales.length === 0) {
                                contenedor.innerHTML = '<div id="mensaje-sin-partidos">No hay partidos destacados hoy.</div>';
                            } else {
                                // Ordenar partidos por hora
                                partidosTotales.sort(function(a, b) {
                                    return new Date(a.fixture.date) - new Date(b.fixture.date);
                                });

                                partidosTotales.forEach(function(partido) {
                                    var fechaPartido = new Date(partido.fixture.date);
                                    var horaStr = ponerCero(fechaPartido.getHours()) + ":" + ponerCero(fechaPartido.getMinutes());
                                    
                                    var div = document.createElement('div');
                                    div.className = 'partido';
                                    div.innerHTML = 
                                        '<div class="competicion">' + partido.league.name + '</div>' +
                                        '<div class="equipos">' + partido.teams.home.name + ' - ' + partido.teams.away.name + '</div>' +
                                        '<div class="hora-partido">' + horaStr + '</div>';
                                    contenedor.appendChild(div);
                                });
                            }
                        }
                    }
                };
                xhr.send();
            });
        }

        // --- INICIAR TODO ---
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        setInterval(actualizarFondo, 600000); // 10 min
        actualizarFondo();

        setInterval(actualizarClima, 1800000); // 30 min
        actualizarClima();

        setInterval(actualizarPartidos, 14400000); // Se actualiza cada 4 horas para ahorrar peticiones a la API
        setTimeout(actualizarPartidos, 2000); // Carga los partidos 2 segundos después de abrir para no atascar el iPad
    </script>
</body>
</html>
