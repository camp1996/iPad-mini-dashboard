<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Dashboard iPad</title>

    <style>
        html, body { background-color: #000; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        body {
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .main-layout {
            position: relative;
            z-index: 10;
            width: 92%;
            height: 96%; 
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-width: 0;
        }

        #greeting {
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: -10px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        #clock { 
            font-size: 13rem; 
            font-weight: 700; 
            letter-spacing: -4px; 
            margin: 0; 
            line-height: 1;
            color: rgba(255, 255, 255, 0.20); 
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.6); 
            text-shadow: 0 15px 30px rgba(0,0,0,0.4); 
        }
        
        #date { 
            font-size: 2.1rem; 
            color: #e4e4e7; 
            font-weight: 400; 
            margin-top: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        #countdown {
            font-size: 1.2rem; 
            color: #ff9f0a; 
            font-weight: 500; 
            margin-top: 25px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .right-column {
            width: 340px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            justify-content: center; 
            gap: 100px; /* <--- Ahora este número mandará de verdad */
            height: auto; /* <--- CAMBIA '100%' POR 'auto' */
        }

        .glass-card { 
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 25px; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 0.85rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .news-item {
            font-size: 1.05rem;
            color: #f4f4f5;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .podcast-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 8px; }
        .tab-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 10px 5px; border-radius: 10px; font-size: 0.75rem; flex-grow: 1; text-align: center; cursor: pointer; }
        .tab-btn.active { background: rgba(255, 159, 10, 0.8); color: #000; font-weight: bold; border: none; } 

        #podcast-content { display: none; flex-direction: column; width: 100%; }
        .podcast-info { display: flex; flex-direction: row; align-items: center; gap: 15px; margin-bottom: 15px; }
        #podcast-img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; }
        #episode-title { font-size: 0.95rem; color: #e4e4e7; margin: 0; line-height: 1.3; text-align: left; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;}
        audio { width: 100%; height: 35px; outline: none; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="main-layout">
        <div class="left-column">
            <div id="greeting">...</div>
            <div id="clock">--:--</div>
            <div id="date">cargando...</div>
            <div id="countdown">...</div>
        </div>

        <div class="right-column">
            <div id="weather-container" class="glass-card" style="padding: 20px 25px;"></div>

            <div class="glass-card">
                <div class="card-title">EL PAÍS - ÚLTIMA HORA</div>
                <div id="news-content" style="color:#aaa; font-size:0.8rem;">Cargando titular...</div>
            </div>

            <div class="glass-card">
                <div class="podcast-tabs">
                    <button class="tab-btn active" onclick="loadPodcast('1570234432', this)">Recarga Activa</button>
                    <button class="tab-btn" onclick="loadPodcast('1642338651', this)">Chiclana</button>
                    <button class="tab-btn" onclick="loadPodcast('359611484', this)">Reload</button>
                </div>
                <div id="podcast-loader" style="color:#aaa; font-size:0.8rem; text-align:center;">buscando episodio...</div>
                <div id="podcast-content">
                    <div class="podcast-info">
                        <img id="podcast-img" src="" alt="">
                        <h4 id="episode-title"></h4>
                    </div>
                    <audio id="audio-player" controls></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateAll() {
            var now = new Date();
            var hours = now.getHours();
            
            var greetText = "";
            if (hours >= 6 && hours < 13) greetText = "buenos días";
            else if (hours >= 13 && hours < 21) greetText = "buenas tardes";
            else greetText = "buenas noches";
            document.getElementById('greeting').innerHTML = greetText;

            document.getElementById('clock').innerHTML = hours.toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('date').innerHTML = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }).toLowerCase();

            const targetDate = new Date(now.getFullYear(), 4, 23);
            if (now > targetDate) targetDate.setFullYear(now.getFullYear() + 1);
            const days = Math.ceil((targetDate - now) / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').textContent = "faltan " + days + " días para el 23 de mayo";
        }
        setInterval(updateAll, 1000); updateAll();

        function loadWeather() {
            var container = document.getElementById('weather-container');
            container.innerHTML = '<a class="weatherwidget-io" href="https://forecast7.com/es/36d47n6d20/san-fernando/" data-label_1="SAN FERNANDO" data-mode="Current" data-font="Helvetica" data-icons="Climacons Animated" data-theme="dark" data-basecolor="rgba(0,0,0,0)" >TIEMPO</a>';
            !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
        }
        loadWeather();
        setInterval(loadWeather, 14400000); 

        function setBg() {
            var backgrounds = [
                "https://images.unsplash.com/photo-1449824913935-59a10b8d5000?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1470071131384-001b85755b36?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1480714378408-67cf736cb4d1?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1426604908151-3729d84e1b8c?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1514565131-8ca1fbf7f15f?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1501862700950-18382cd30e8f?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1449844908441-8829872d2607?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1496568816309-51d7c20e3b21?q=80&w=2048&auto=format&fit=crop"  
            ];
            document.body.style.backgroundImage = "url('" + backgrounds[new Date().getDate() % backgrounds.length] + "')";
        }
        setBg();

        async function loadNews() {
            try {
                var res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent('https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/portada'));
                var data = await res.json();
                document.getElementById('news-content').innerHTML = '<div class="news-item">' + data.items[0].title + '</div>';
            } catch(e) { document.getElementById('news-content').innerHTML = "No se pudo cargar la noticia."; }
        }
        loadNews(); setInterval(loadNews, 3600000);

        async function loadPodcast(id, btn) {
            if(btn) {
                var btns = document.getElementsByClassName('tab-btn');
                for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
                btn.classList.add('active');
            }
            document.getElementById('podcast-loader').style.display = 'block';
            document.getElementById('podcast-content').style.display = 'none';
            try {
                var r1 = await fetch("https://itunes.apple.com/lookup?id=" + id);
                var d1 = await r1.json();
                var r2 = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(d1.results[0].feedUrl));
                var d2 = await r2.json();
                document.getElementById('podcast-loader').style.display = 'none';
                document.getElementById('podcast-content').style.display = 'flex';
                document.getElementById('podcast-img').src = d1.results[0].artworkUrl600;
                document.getElementById('episode-title').innerHTML = d2.items[0].title;
                document.getElementById('audio-player').src = d2.items[0].enclosure.link;
            } catch(e) { document.getElementById('podcast-loader').innerHTML = "Error al conectar."; }
        }
        loadPodcast('1570234432', null);
    </script>
</body>
</html>
