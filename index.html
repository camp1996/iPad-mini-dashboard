<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dashboard</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            /* Degradado de respaldo por si falla la imagen */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            /* Imagen de fondo simplificada para mayor compatibilidad */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Moraine_Lake_17092005.jpg/1920px-Moraine_Lake_17092005.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Capa negra que se activará por la noche */
        .night-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: black;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }
        body.is-night .night-overlay {
            opacity: 1;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 2;
            width: 95%;
        }
        .time {
            /* HORA GIGANTE */
            font-size: 28vw;
            font-weight: 200;
            letter-spacing: -5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin: 0;
            line-height: 0.9;
        }
        .date {
            font-size: 3.5vw;
            font-weight: 300;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-transform: capitalize;
            margin-bottom: 20px;
        }
        .widgets {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .widget {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 30px;
            min-width: 150px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .widget-title {
            font-size: 1.3vw;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .widget-value {
            font-size: 4vw;
            font-weight: 200;
        }
    </style>
</head>
<body id="body">
    <div class="night-overlay" id="overlay"></div>
    <div class="container">
        <div class="time" id="time">00:00</div>
        <div class="date" id="date">Cargando...</div>
        
        <div class="widgets">
            <div class="widget">
                <div class="widget-title">El Tiempo</div>
                <div class="widget-value" id="weather">--°C</div>
            </div>
            <div class="widget">
                <div class="widget-title">Para el 23 de Mayo</div>
                <div class="widget-value"><span id="countdown">--</span> días</div>
            </div>
        </div>
    </div>

    <script>
        function updateDashboard() {
            const now = new Date();
            
            // 1. Actualizar Hora
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            
            // 2. Actualizar Fecha
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', options);
            
            // 3. Modo Noche (De 00:00 a 08:00)
            const body = document.getElementById('body');
            if (now.getHours() >= 0 && now.getHours() < 8) {
                body.classList.add('is-night');
            } else {
                body.classList.remove('is-night');
            }
            
            // 4. Cuenta atrás para el 23 de Mayo
            let target = new Date(now.getFullYear(), 4, 23); 
            if (now.getTime() > target.getTime() && now.getDate() !== 23) {
                target.setFullYear(now.getFullYear() + 1);
            }
            const diffTime = target - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').textContent = diffDays;
        }

        // 5. El Tiempo
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.4667&longitude=-6.1983&current_weather=true');
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                document.getElementById('weather').textContent = `${temp}°C`;
            } catch (e) {
                document.getElementById('weather').textContent = '—°C';
            }
        }

        setInterval(updateDashboard, 1000);
        updateDashboard();
        fetchWeather();
        setInterval(fetchWeather, 1800000);
    </script>
</body>
</html>
