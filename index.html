<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Dashboard Fútbol</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        #fondo { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            z-index: 1; transition: background-image 2s ease-in-out; opacity: 0.55; 
        }

        #contenedor { 
            position: relative; z-index: 10; display: flex; 
            width: 100%; height: 100%; color: white; 
        }

        /* Lado Izquierdo: Reloj y Clima */
        #bloque-reloj { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.8); 
            padding-left: 20px;
        }
        #saludo { font-size: 2.5em; font-weight: 300; margin-bottom: -10px; color: #ccc; }
        #reloj { font-size: 11em; font-weight: 200; margin: 0; letter-spacing: -4px; }
        #fecha { font-size: 2em; font-weight: 300; margin-top: 5px; color: #eee; }
        #clima { font-size: 2em; font-weight: 300; margin-top: 20px; color: #4CAF50; }

        /* Lado Derecho: Fútbol */
        #bloque-futbol { 
            width: 320px; display: flex; flex-direction: column; 
            justify-content: center; padding-right: 25px; 
        }
        #panel { 
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 25px; padding: 20px; max-height: 85vh; overflow-y: auto; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5); 
        }
        .titulo { font-size: 1.4em; font-weight: 400; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 15px; }
        
        .partido { margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .partido:last-child { border-bottom: none; }
        .liga { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .equipos { font-size: 0.95em; font-weight: 400; line-height: 1.3; }
        .hora { color: #4CAF50; font-size: 0.85em; font-weight: bold; margin-top: 4px; }
        .mensaje { text-align: center; font-style: italic; color: #777; font-size: 0.85em; }
    </style>
</head>
<body>

    <div id="fondo"></div>

    <div id="contenedor">
        <div id="bloque-reloj">
            <div id="saludo">Hola</div>
            <div id="reloj">--:--</div>
            <div id="fecha">...</div>
            <div id="clima">🌡️ --°C</div>
        </div>

        <div id="bloque-futbol">
            <div id="panel">
                <div class="titulo">⚽ Hoy</div>
                <div id="lista-partidos">
                    <div class="mensaje">Conectando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // TOKEN CONFIGURADO
        var TOKEN = "938059db35794b3e9899b075719dd2d1";
        
        function zero(n) { return n < 10 ? '0' + n : n; }

        // 1. RELOJ
        function actualizarReloj() {
            var ahora = new Date();
            var h = ahora.getHours(), m = ahora.getMinutes();
            var saludo = (h >= 6 && h < 13) ? "Buenos días" : (h >= 13 && h < 20) ? "Buenas tardes" : "Buenas noches";
            
            document.getElementById('saludo').innerHTML = saludo;
            document.getElementById('reloj').innerHTML = zero(h) + ":" + zero(m);
            
            var dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            var meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
            document.getElementById('fecha').innerHTML = dias[ahora.getDay()] + ", " + ahora.getDate() + " de " + meses[ahora.getMonth()];
        }

        // 2. FONDO
        function actualizarFondo() {
            var h = new Date().getHours();
            if (h >= 0 && h < 8) {
                document.getElementById('fondo').style.backgroundImage = "none";
            } else {
                var url = "https://picsum.photos/1024/768/?random&t=" + new Date().getTime();
                document.getElementById('fondo').style.backgroundImage = "url('" + url + "')";
            }
        }

        // 3. CLIMA
        function actualizarClima() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://api.open-meteo.com/v1/forecast?latitude=36.4665&longitude=-6.1989&current_weather=true", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var d = JSON.parse(xhr.responseText);
                    document.getElementById('clima').innerHTML = "🌡️ " + Math.round(d.current_weather.temperature) + "°C";
                }
            };
            xhr.send();
        }

        // 4. FÚTBOL (MÉTODO ULTRA-COMPATIBLE)
        function actualizarFutbol() {
            var contenedor = document.getElementById('lista-partidos');
            
            // Usamos un proxy que reenvía cabeceras sin problemas
            var urlOriginal = "https://api.football-data.org/v4/matches";
            var urlProxy = "https://thingproxy.freeboard.io/fetch/" + urlOriginal;

            var xhr = new XMLHttpRequest();
            xhr.open("GET", urlProxy, true);
            xhr.setRequestHeader("X-Auth-Token", TOKEN);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        var res = JSON.parse(xhr.responseText);
                        var partidos = res.matches || [];
                        var html = "";
                        
                        if (partidos.length === 0) {
                            html = '<div class="mensaje">No hay partidos destacados para hoy.</div>';
                        } else {
                            // Filtramos solo ligas importantes para que no sea una lista infinita
                            var ligasOK = ["UEFA Champions League", "Primera Division", "UEFA Europa League", "Premier League"];
                            
                            partidos.forEach(function(p) {
                                if (ligasOK.indexOf(p.competition.name) !== -1) {
                                    var fP = new Date(p.utcDate);
                                    var hP = zero(fP.getHours()) + ":" + zero(fP.getMinutes());
                                    html += '<div class="partido">' +
                                            '<div class="liga">' + p.competition.name + '</div>' +
                                            '<div class="equipos">' + p.homeTeam.shortName + ' - ' + p.awayTeam.shortName + '</div>' +
                                            '<div class="hora">' + hP + '</div>' +
                                            '</div>';
                                }
                            });
                            if (html === "") html = '<div class="mensaje">Sin partidos de ligas principales hoy.</div>';
                        }
                        contenedor.innerHTML = html;
                    } else {
                        // Si da error, mostramos un mensaje útil
                        contenedor.innerHTML = '<div class="mensaje">Error: ' + xhr.status + '.<br>Revisa el escudo de Vivaldi.</div>';
                    }
                }
            };
            xhr.send();
        }

        setInterval(actualizarReloj, 1000); actualizarReloj();
        setInterval(actualizarFondo, 600000); actualizarFondo();
        setInterval(actualizarClima, 1800000); actualizarClima();
        setInterval(actualizarFutbol, 3600000); setTimeout(actualizarFutbol, 1000);
    </script>
</body>
</html>
