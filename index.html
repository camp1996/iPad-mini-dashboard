<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Dashboard iPad</title>

    <style>
        /* RESET Y FONDO */
        html, body { background-color: #000; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        body {
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CAPA OSCURA DE CONTRASTE */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        /* ESTRUCTURA PRINCIPAL (ASIMÉTRICA) */
        .main-layout {
            position: relative;
            z-index: 10;
            width: 92%;
            height: 90%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        /* COLUMNA IZQUIERDA (HORA Y FECHA) */
        .left-column {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* HORA GIGANTE TRANSPARENTE */
        #clock { 
            font-size: 15rem; 
            font-weight: 700; 
            letter-spacing: -6px; 
            margin: 0; 
            line-height: 1;
            /* Efecto cristal en el texto */
            color: rgba(255, 255, 255, 0.20); 
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.6); 
            text-shadow: 0 15px 30px rgba(0,0,0,0.4); 
        }
        
        #date { 
            font-size: 2.2rem; 
            color: #e4e4e7; 
            font-weight: 400; 
            margin-top: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        #countdown {
            font-size: 1.2rem; 
            color: #ff9f0a; 
            font-weight: 500; 
            margin-top: 20px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* COLUMNA DERECHA (TARJETAS) */
        .right-column {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px; 
            flex-shrink: 0;
        }

        /* ESTILO COMÚN DE LAS TARJETAS DE CRISTAL */
        .glass-card { 
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 20px; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* TARJETA 2: NOTICIAS */
        .card-title {
            font-size: 0.8rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #news-content { display: flex; flex-direction: column; gap: 12px; }

        .news-item {
            font-size: 1.05rem; /* Letra un poco más grande al ser solo una noticia */
            color: #f4f4f5;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4; /* Permite hasta 4 líneas si el titular es largo */
            -webkit-box-orient: vertical;
            overflow: hidden;
            border-bottom: none; /* Quitamos la línea separadora */
            padding-bottom: 0;
        }

        /* TARJETA 3: PODCASTS */
        .podcast-tabs { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 8px; }
        .tab-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 8px 4px; border-radius: 8px; font-size: 0.75rem; flex-grow: 1; text-align: center; cursor: pointer; transition: all 0.2s;}
        .tab-btn.active { background: rgba(255, 159, 10, 0.8); color: #000; font-weight: bold; border: none; } 

        #podcast-content { display: none; flex-direction: column; width: 100%; }
        .podcast-info { display: flex; flex-direction: row; align-items: center; gap: 15px; margin-bottom: 12px; }
        #podcast-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        #episode-title { font-size: 0.9rem; color: #e4e4e7; margin: 0; line-height: 1.3; text-align: left; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;}
        audio { width: 100%; height: 35px; outline: none;}
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="main-layout">
        
        <div class="left-column">
            <div id="clock">--:--</div>
            <div id="date">cargando...</div>
            <div id="countdown">...</div>
        </div>

        <div class="right-column">
            
            <div class="glass-card" style="padding: 15px 20px;">
                <a class="weatherwidget-io" href="https://forecast7.com/es/36d47n6d20/san-fernando/" data-label_1="SAN FERNANDO" data-mode="Current" data-font="Helvetica" data-icons="Climacons Animated" data-theme="dark" data-basecolor="rgba(0,0,0,0)" >TIEMPO</a>
                <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
            </div>

            <div class="glass-card">
                <div class="card-title">EL PAÍS - ÚLTIMA HORA</div>
                <div id="news-content" style="color:#aaa; font-size:0.8rem;">Cargando titular...</div>
            </div>

            <div class="glass-card">
                <div class="podcast-tabs">
                    <button class="tab-btn active" onclick="loadPodcast('1570234432', this)">Recarga Activa</button>
                    <button class="tab-btn" onclick="loadPodcast('1642338651', this)">Chiclana</button>
                    <button class="tab-btn" onclick="loadPodcast('359611484', this)">Reload</button>
                </div>
                <div id="podcast-loader" style="color:#aaa; font-size:0.8rem; text-align:center;">buscando episodio...</div>
                <div id="podcast-content">
                    <div class="podcast-info">
                        <img id="podcast-img" src="" alt="">
                        <h4 id="episode-title"></h4>
                    </div>
                    <audio id="audio-player" controls></audio>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. RELOJ, FECHA Y CUENTA ATRÁS
        function updateAll() {
            var now = new Date();
            var h = now.getHours().toString().padStart(2, '0');
            var m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerHTML = h + ":" + m;

            var dOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerHTML = now.toLocaleDateString('es-ES', dOptions).toLowerCase();

            var target = new Date(now.getFullYear(), 4, 23);
            if (now > target) target.setFullYear(now.getFullYear() + 1);
            var diff = target - now;
            var days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerHTML = "faltan " + days + " días para el 23 de mayo";
        }
        setInterval(updateAll, 1000);
        updateAll();

        // 2. IMAGEN DE FONDO UNSPLASH (Naturaleza y Urbana)
        function setBg() {
            var backgrounds = [
                "https://images.unsplash.com/photo-1449824913935-59a10b8d5000?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1470071131384-001b85755b36?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1480714378408-67cf736cb4d1?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1426604908151-3729d84e1b8c?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1514565131-8ca1fbf7f15f?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1501862700950-18382cd30e8f?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1449844908441-8829872d2607?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=2048&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1496568816309-51d7c20e3b21?q=80&w=2048&auto=format&fit=crop"  
            ];
            var dayOfMonth = new Date().getDate(); 
            var index = dayOfMonth % backgrounds.length;
            document.body.style.backgroundImage = "url('" + backgrounds[index] + "')";
        }
        setBg();

        // 3. NOTICIAS DE ESPAÑA (El País RSS) - SOLO 1 NOTICIA
        async function loadNews() {
            try {
                var rssUrl = 'https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/portada';
                var res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl));
                var data = await res.json();
                
                // Extraemos únicamente el primer titular (índice 0)
                var html = '<div class="news-item">' + data.items[0].title + '</div>';
                
                document.getElementById('news-content').innerHTML = html;
            } catch(e) {
                document.getElementById('news-content').innerHTML = "No se pudo cargar la noticia.";
            }
        }
        loadNews();
        setInterval(loadNews, 3600000); 

        // 4. PODCASTS
        async function loadPodcast(id, btn) {
            if(btn) {
                var btns = document.getElementsByClassName('tab-btn');
                for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
                btn.classList.add('active');
            }
            
            document.getElementById('podcast-loader').style.display = 'block';
            document.getElementById('podcast-content').style.display = 'none';
            document.getElementById('audio-player').pause();
            
            try {
                var r1 = await fetch("https://itunes.apple.com/lookup?id=" + id);
                var d1 = await r1.json();
                var feed = d1.results[0].feedUrl;
                var img = d1.results[0].artworkUrl600;

                var r2 = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed));
                var d2 = await r2.json();
                
                document.getElementById('podcast-loader').style.display = 'none';
                document.getElementById('podcast-content').style.display = 'flex';
                document.getElementById('podcast-img').src = img;
                document.getElementById('episode-title').innerHTML = d2.items[0].title;
                document.getElementById('audio-player').src = d2.items[0].enclosure.link;
            } catch(e) {
                document.getElementById('podcast-loader').innerHTML = "Error al conectar.";
            }
        }
        loadPodcast('1570234432', null);
    </script>
</body>
</html>
